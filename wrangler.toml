name = "postervia-web"
compatibility_date = "2024-11-01"
main = "_worker.js"

# _worker.js stays in the repo root (outside the assets directory) so wrangler
# treats it as Worker code, not as a public static asset. The public/ folder
# holds everything served unchanged via env.ASSETS.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
