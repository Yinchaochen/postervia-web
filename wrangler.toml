name = "postervia-web"
compatibility_date = "2024-11-01"
main = "_worker.js"

# Worker code in _worker.js intercepts requests, rewrites pretty URLs (e.g.
# /privacy → /privacy.html), and delegates everything to the asset binding.
# run_worker_first lets us catch /privacy before the asset handler 404s on it.
[assets]
directory = "./"
binding = "ASSETS"
run_worker_first = true
