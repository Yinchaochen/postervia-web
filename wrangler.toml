name = "postervia-web"
compatibility_date = "2024-11-01"
main = "worker.js"

# worker.js (not _worker.js — the underscore prefix is Cloudflare Pages magic
# name and confuses wrangler in Workers Static Assets mode, causing env.ASSETS
# to be undefined at runtime). The public/ folder holds everything served
# unchanged via env.ASSETS.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
